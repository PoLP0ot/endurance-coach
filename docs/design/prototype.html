<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endurance Coach — Your Garmin data, finally decoded.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ENDURANCE COACH — Interactive Prototype
   Hybrid A (Swiss Precision) × D (Alpine Technical)
   ============================================================ */
:root{
  --bg:#E9E4D8; --bg-deep:#E2DBCC; --paper:#F3EFE5; --paper-2:#EDE7DA;
  --ink:#38382C; --ink-soft:#54513F; --slate:#7C7765; --slate-lt:#9A9583;
  --line:#CFC7B4; --line-soft:#DCD5C4;
  --accent:#D9703A; --accent-dk:#BC5A28; --olive:#6E7644; --rust:#C4612F; --taupe:#A99C7F;
  --good:#6E7644; --maxw:1180px; --radius:3px;
  color-scheme:light;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{
  background-color:var(--bg);
  background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
  background-size:32px 32px,32px 32px; background-position:-1px -1px;
  color:var(--ink); font-family:'Inter',system-ui,sans-serif; font-size:15px; line-height:1.55;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; min-height:100vh;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:radial-gradient(120% 90% at 80% -10%,rgba(110,118,68,.06),transparent 55%),radial-gradient(90% 80% at -10% 110%,rgba(217,112,58,.05),transparent 50%);
}
h1,h2,h3,h4,.display{font-family:'Inter Tight','Inter',sans-serif;font-weight:600;letter-spacing:-.02em;color:var(--ink);line-height:1.05;}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--slate);}
.accent{color:var(--accent);}
.wrap{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:0 32px;}
.wrap-narrow{max-width:460px;}

/* buttons */
.btn{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:14px;padding:12px 22px;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;text-decoration:none;display:inline-block;text-align:center;transition:background .14s,border-color .14s,color .14s;line-height:1.2;}
.btn.primary{background:var(--accent);color:#FBF7EE;}
.btn.primary:hover{background:var(--accent-dk);}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--line);}
.btn.ghost:hover{border-color:var(--slate);}
.btn.block{display:block;width:100%;}
.btn.sm{padding:8px 15px;font-size:13px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.link{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:500;}
.link:hover{text-decoration:underline;}
a{color:inherit;}

.pill{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink-soft);border:1px solid var(--line);padding:4px 11px;border-radius:100px;background:var(--paper);}
.pill.free{color:var(--slate);}
.pill.premium{color:#FBF7EE;background:var(--accent);border-color:var(--accent);}

/* ===== TOP BAR (app) ===== */
.topbar{position:sticky;top:0;z-index:40;border-bottom:1px solid var(--line);background:rgba(233,228,216,.88);backdrop-filter:blur(8px);}
.topbar .row{display:flex;align-items:center;justify-content:space-between;height:58px;gap:20px;}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;}
.brand .glyph{width:26px;height:26px;flex:none;border:1.5px solid var(--ink);border-radius:50%;display:grid;place-items:center;position:relative;}
.brand .glyph::after{content:"";position:absolute;width:7px;height:7px;background:var(--accent);border-radius:50%;}
.brand .name{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:15px;letter-spacing:-.01em;white-space:nowrap;}
.topnav{display:flex;gap:26px;flex:1;}
.topnav a{font-size:13.5px;color:var(--slate);text-decoration:none;cursor:pointer;padding:4px 0;border-bottom:2px solid transparent;}
.topnav a:hover{color:var(--ink-soft);}
.topnav a.on{color:var(--ink);border-bottom-color:var(--accent);}
.topright{display:flex;align-items:center;gap:14px;}
.avatar{width:34px;height:34px;flex:none;border-radius:50%;background:radial-gradient(circle at 32% 30%,#8A8B5C,#565a34);color:#F3EFE5;display:grid;place-items:center;font-family:'Inter Tight',sans-serif;font-weight:600;font-size:13px;cursor:pointer;border:1px solid rgba(56,56,44,.1);}
.avatar-menu{position:absolute;top:48px;right:0;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);min-width:170px;box-shadow:0 8px 28px rgba(56,56,44,.10);overflow:hidden;z-index:50;}
.avatar-menu .mi{padding:11px 16px;font-size:13.5px;cursor:pointer;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:9px;}
.avatar-menu .mi:last-child{border-bottom:0;}
.avatar-menu .mi:hover{background:var(--paper-2);}
.avatar-menu .mi.danger{color:var(--accent);}
.av-wrap{position:relative;}

/* ===== generic cards / hairline ===== */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);}
.card-head{display:flex;justify-content:space-between;align-items:baseline;padding:18px 22px 14px;border-bottom:1px solid var(--line-soft);gap:12px;}
.card-head h3{font-size:15px;}
.card-head .sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--slate);letter-spacing:.12em;white-space:nowrap;}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:24px;padding:22px 0 18px;border-bottom:1px solid var(--line);margin-bottom:28px;flex-wrap:wrap;}
.sec-head .idx{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--accent);}
.sec-head h2{font-size:24px;}
.sec-head .meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);letter-spacing:.12em;text-align:right;}

/* ===== forms ===== */
.field{margin-bottom:16px;}
.field label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);margin-bottom:7px;}
.field input,.field select{width:100%;font-family:'Inter',sans-serif;font-size:14.5px;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper);color:var(--ink);outline:none;transition:border-color .14s;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field input.err{border-color:var(--rust);}
.field .msg{font-size:12px;color:var(--rust);margin-top:5px;min-height:0;font-family:'JetBrains Mono',monospace;}
.field .hint{font-size:11.5px;color:var(--slate);margin-top:5px;}

/* toggle (segmented) */
.seg{display:inline-flex;border:1px solid var(--line);border-radius:100px;background:var(--paper);padding:3px;}
.seg button{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:12.5px;padding:6px 16px;border:none;background:transparent;color:var(--slate);cursor:pointer;border-radius:100px;transition:all .14s;}
.seg button.on{background:var(--ink);color:var(--paper);}

/* chips */
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip-btn{font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.04em;padding:7px 14px;border:1px solid var(--line);border-radius:100px;background:var(--paper);color:var(--slate);cursor:pointer;transition:all .14s;}
.chip-btn:hover{border-color:var(--slate);}
.chip-btn.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}

/* badge */
.badge{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--slate);border:1px solid var(--line);border-radius:100px;padding:2px 7px;display:inline-block;}
.badge.ai{color:var(--accent);border-color:var(--accent);}

/* ===== landing ===== */
.lp-hero{padding:72px 0 64px;}
.lp-hero .eyebrow{margin-bottom:22px;}
.lp-hero h1{font-size:64px;line-height:.98;max-width:15ch;margin-bottom:24px;letter-spacing:-.03em;}
.lp-hero h1 em{font-style:normal;color:var(--accent);}
.lp-hero .lede{font-size:18px;color:var(--ink-soft);max-width:50ch;margin-bottom:32px;line-height:1.5;}
.lp-hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center;}
.lp-visual{border:1px solid var(--line);border-radius:var(--radius);background:var(--paper-2);overflow:hidden;}
.lp-visual svg{display:block;width:100%;height:auto;}
.cta-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.lp-trust{display:flex;gap:34px;margin-top:36px;padding-top:24px;border-top:1px solid var(--line-soft);flex-wrap:wrap;}
.lp-trust .v{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:24px;font-variant-numeric:tabular-nums;}
.lp-trust .k{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--slate);letter-spacing:.12em;}

.lp-section{padding:60px 0;border-top:1px solid var(--line);}
.lp-section .lp-st{text-align:center;margin-bottom:44px;}
.lp-section .lp-st .eyebrow{margin-bottom:14px;display:block;}
.lp-section .lp-st h2{font-size:38px;letter-spacing:-.02em;}
.lp-section .lp-st p{color:var(--slate);max-width:54ch;margin:14px auto 0;font-size:16px;}

.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--paper);}
.step{padding:32px 28px;border-right:1px solid var(--line);}
.step:last-child{border-right:0;}
.step .n{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.18em;margin-bottom:14px;}
.step h4{font-size:19px;margin-bottom:10px;}
.step p{font-size:14px;color:var(--slate);line-height:1.5;}

.features{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.feature{padding:30px 26px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);}
.feature .fi{width:40px;height:40px;border:1.5px solid var(--ink);border-radius:50%;display:grid;place-items:center;margin-bottom:18px;}
.feature h4{font-size:18px;margin-bottom:9px;}
.feature p{font-size:14px;color:var(--slate);line-height:1.55;}

/* comparison table */
.cmp{width:100%;border-collapse:collapse;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;font-size:14px;}
.cmp th,.cmp td{padding:14px 16px;text-align:center;border-bottom:1px solid var(--line-soft);border-right:1px solid var(--line-soft);}
.cmp th:first-child,.cmp td:first-child{text-align:left;font-weight:500;}
.cmp th{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:13.5px;background:var(--paper-2);}
.cmp th.hl{color:var(--accent);}
.cmp tr:last-child td{border-bottom:0;}
.cmp td:last-child,.cmp th:last-child{border-right:0;}
.cmp .yes{color:var(--olive);font-weight:600;}
.cmp .no{color:var(--slate-lt);}
.cmp .col-hl{background:rgba(217,112,58,.05);}

/* pricing */
.pricing{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;max-width:760px;margin:0 auto;}
.plan{padding:34px 30px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);position:relative;}
.plan.feat{border-color:var(--accent);border-width:1.5px;}
.plan .ptag{position:absolute;top:-11px;left:30px;background:var(--accent);color:#FBF7EE;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;padding:4px 10px;border-radius:100px;}
.plan h3{font-size:20px;margin-bottom:6px;}
.plan .price{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:46px;letter-spacing:-.03em;line-height:1;margin:14px 0 4px;font-variant-numeric:tabular-nums;}
.plan .price u{text-decoration:none;font-size:15px;color:var(--slate);font-weight:500;}
.plan .pdesc{font-size:13px;color:var(--slate);margin-bottom:20px;min-height:20px;}
.plan ul{list-style:none;margin:20px 0;}
.plan li{font-size:13.5px;color:var(--ink-soft);padding:8px 0 8px 24px;position:relative;border-bottom:1px solid var(--line-soft);}
.plan li:last-child{border-bottom:0;}
.plan li::before{content:"✓";position:absolute;left:0;color:var(--olive);font-weight:600;}
.plan li.off{color:var(--slate-lt);}
.plan li.off::before{content:"–";color:var(--slate-lt);}

/* FAQ */
.faq{max-width:760px;margin:0 auto;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--paper);}
.faq-item{border-bottom:1px solid var(--line-soft);}
.faq-item:last-child{border-bottom:0;}
.faq-q{padding:18px 22px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:'Inter Tight',sans-serif;font-weight:600;font-size:15.5px;gap:16px;}
.faq-q:hover{background:var(--paper-2);}
.faq-q .ic{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:18px;transition:transform .2s;flex:none;}
.faq-item.open .faq-q .ic{transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .25s ease;padding:0 22px;color:var(--slate);font-size:14px;line-height:1.6;}
.faq-item.open .faq-a{max-height:200px;padding:0 22px 20px;}

/* footer */
.lp-footer{border-top:1px solid var(--line);padding:40px 0;margin-top:0;}
.lp-footer .row{display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;}
.lp-footer .mono{font-size:11px;color:var(--slate);letter-spacing:.1em;}
.lp-footer .fnav{display:flex;gap:22px;}
.lp-footer .fnav a{font-size:12.5px;color:var(--slate);cursor:pointer;}
.lp-footer .fnav a:hover{color:var(--ink);}

/* auth */
.auth-shell{min-height:calc(100vh - 0px);display:grid;place-items:center;padding:48px 20px;}
.auth-card{width:100%;max-width:420px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:36px 34px;}
.auth-card .tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:26px;}
.auth-card .tabs button{flex:1;font-family:'Inter Tight',sans-serif;font-weight:600;font-size:15px;padding:0 0 13px;background:none;border:none;color:var(--slate);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.auth-card .tabs button.on{color:var(--ink);border-bottom-color:var(--accent);}
.auth-logo{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:26px;cursor:pointer;}

/* onboarding */
.ob-shell{min-height:100vh;display:grid;place-items:center;padding:48px 20px;}
.ob-card{width:100%;max-width:520px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:48px 44px;text-align:center;}
.ob-icon{width:72px;height:72px;border:1.5px solid var(--ink);border-radius:50%;display:grid;place-items:center;margin:0 auto 24px;position:relative;}
.ob-card h2{font-size:28px;margin-bottom:14px;}
.ob-card p{color:var(--slate);font-size:15px;line-height:1.6;max-width:42ch;margin:0 auto 28px;}
.ob-progress{text-align:left;margin:8px 0;}
.ob-step{display:flex;align-items:center;gap:12px;padding:11px 0;font-size:14.5px;color:var(--slate);border-bottom:1px solid var(--line-soft);}
.ob-step:last-child{border-bottom:0;}
.ob-step .dot{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line);flex:none;display:grid;place-items:center;font-size:11px;}
.ob-step.done{color:var(--ink);}
.ob-step.done .dot{background:var(--olive);border-color:var(--olive);color:#FBF7EE;}
.ob-step.active{color:var(--ink);}
.ob-step.active .dot{border-color:var(--accent);border-top-color:transparent;animation:spin .7s linear infinite;}
.reassure{display:flex;gap:10px;align-items:flex-start;text-align:left;background:var(--paper-2);border:1px solid var(--line-soft);border-radius:var(--radius);padding:14px 16px;margin-bottom:24px;font-size:13px;color:var(--ink-soft);line-height:1.5;}
.reassure .lock{flex:none;color:var(--olive);}

/* ===== dashboard ===== */
.page{padding:30px 0 70px;}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px;gap:20px;flex-wrap:wrap;}
.page-head h2{font-size:26px;}
.page-head .range{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);letter-spacing:.1em;}
.ai-note{display:flex;gap:11px;align-items:flex-start;background:rgba(217,112,58,.06);border:1px solid rgba(217,112,58,.22);border-radius:var(--radius);padding:13px 16px;margin:18px 0 26px;font-size:14px;color:var(--ink-soft);}
.ai-note .ai-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;margin-top:7px;}
.ai-note b{color:var(--ink);font-weight:600;}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--paper);margin-bottom:28px;}
.metric{padding:20px 22px 22px;border-right:1px solid var(--line);position:relative;}
.metric:last-child{border-right:0;}
.metric .k{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--slate);text-transform:uppercase;}
.metric .v{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:40px;letter-spacing:-.03em;line-height:1;margin:14px 0 8px;font-variant-numeric:tabular-nums;}
.metric .v u{text-decoration:none;font-size:15px;color:var(--slate);font-weight:500;margin-left:3px;}
.metric .d{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);display:flex;align-items:center;gap:6px;}
.metric .d .up{color:var(--olive);}.metric .d .dn{color:var(--accent);}
.metric .spark{position:absolute;right:18px;top:20px;opacity:.9;}

.dash-main{display:grid;grid-template-columns:1.62fr 1fr;gap:26px;}
.legend{display:flex;gap:18px;padding:12px 22px 0;flex-wrap:wrap;}
.legend span{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--slate);display:flex;align-items:center;gap:7px;letter-spacing:.06em;}
.legend i{width:14px;height:3px;border-radius:2px;display:block;}
.chart-wrap{padding:8px 14px 18px;}

.acts{padding:4px 0 6px;}
.act{display:grid;grid-template-columns:40px 1fr auto;gap:14px;align-items:center;padding:13px 22px;border-bottom:1px solid var(--line-soft);cursor:pointer;transition:background .12s;}
.act:last-child{border-bottom:0;}
.act:hover{background:var(--paper-2);}
.act .day{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--slate);text-align:center;line-height:1.25;}
.act .day b{display:block;color:var(--ink);font-size:13px;font-weight:600;}
.act .info .t{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.act .info .m{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);margin-top:3px;}
.act .tss{text-align:right;}
.act .tss b{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:17px;font-variant-numeric:tabular-nums;}
.act .tss .u{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--slate);letter-spacing:.16em;display:block;}

/* skeleton */
.sk{background:linear-gradient(90deg,var(--line-soft) 25%,var(--paper-2) 50%,var(--line-soft) 75%);background-size:200% 100%;animation:shimmer 1.3s infinite;border-radius:3px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
@keyframes spin{to{transform:rotate(360deg);}}
.sk-metric{height:120px;}
.empty-state,.error-state{text-align:center;padding:64px 24px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);}
.empty-state .ei,.error-state .ei{width:56px;height:56px;border:1.5px solid var(--line);border-radius:50%;display:grid;place-items:center;margin:0 auto 20px;color:var(--slate);}
.empty-state h3,.error-state h3{font-size:20px;margin-bottom:10px;}
.empty-state p,.error-state p{color:var(--slate);margin-bottom:22px;max-width:40ch;margin-left:auto;margin-right:auto;}

/* ===== activity detail ===== */
.back-link{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--slate);cursor:pointer;letter-spacing:.08em;margin-bottom:18px;}
.back-link:hover{color:var(--ink);}
.ad-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:22px;flex-wrap:wrap;}
.ad-head h2{font-size:28px;margin-bottom:6px;}
.ad-head .dt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--slate);letter-spacing:.08em;}
.tss-big{text-align:right;}
.tss-big b{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:32px;font-variant-numeric:tabular-nums;color:var(--accent);}
.tss-big span{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--slate);letter-spacing:.18em;}
.map-box{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:#2A2A22;margin-bottom:24px;}
.map-box svg{display:block;width:100%;height:auto;}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--paper);margin-bottom:24px;}
.mcell{padding:16px 18px;border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);}
.mcell .k{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;color:var(--slate);text-transform:uppercase;}
.mcell .v{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:24px;font-variant-numeric:tabular-nums;margin:6px 0 3px;}
.mcell .v u{text-decoration:none;font-size:12px;color:var(--slate);}
.mcell .c{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--slate);}
.mcell .c .up{color:var(--olive);}.mcell .c .dn{color:var(--rust);}
.ai-analysis{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:24px 26px;margin-bottom:24px;}
.ai-analysis .ah{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.ai-analysis .ah .ai-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);}
.ai-analysis .ah h3{font-size:16px;}
.ai-analysis p{font-size:14.5px;color:var(--ink-soft);line-height:1.65;margin-bottom:13px;}
.ai-analysis p:last-child{margin-bottom:0;}
.laps{width:100%;border-collapse:collapse;font-size:13px;}
.laps th{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;color:var(--slate);text-transform:uppercase;text-align:right;padding:10px 14px;border-bottom:1px solid var(--line);font-weight:500;}
.laps th:first-child{text-align:left;}
.laps td{padding:10px 14px;border-bottom:1px solid var(--line-soft);text-align:right;font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;}
.laps td:first-child{text-align:left;font-family:'Inter Tight';font-weight:600;}
.laps tr:last-child td{border-bottom:0;}

/* ===== coach chat ===== */
.chat-shell{display:flex;flex-direction:column;height:calc(100vh - 58px);}
.chat-scroll{flex:1;overflow-y:auto;padding:28px 0;}
.chat-inner{max-width:760px;margin:0 auto;padding:0 32px;}
.msg{display:flex;gap:12px;margin-bottom:20px;max-width:84%;}
.msg.user{margin-left:auto;flex-direction:row-reverse;}
.msg .mav{width:30px;height:30px;border-radius:50%;flex:none;display:grid;place-items:center;font-family:'Inter Tight';font-weight:600;font-size:11px;}
.msg.coach .mav{border:1.5px solid var(--ink);position:relative;}
.msg.coach .mav::after{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);position:absolute;}
.msg.user .mav{background:radial-gradient(circle at 32% 30%,#8A8B5C,#565a34);color:#F3EFE5;}
.bubble{padding:13px 16px;border-radius:12px;font-size:14.5px;line-height:1.55;}
.msg.coach .bubble{background:var(--paper);border:1px solid var(--line);border-top-left-radius:3px;}
.msg.user .bubble{background:var(--ink);color:var(--paper);border-top-right-radius:3px;}
.bubble b{font-weight:600;}
.typing{display:flex;gap:4px;padding:15px 16px;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--slate-lt);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.18s;}
.typing span:nth-child(3){animation-delay:.36s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-5px);opacity:1;}}
.chat-foot{border-top:1px solid var(--line);background:var(--paper);padding:14px 0;}
.chat-foot-inner{max-width:760px;margin:0 auto;padding:0 32px;}
.suggest{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.chat-input{display:flex;gap:10px;}
.chat-input input{flex:1;font-family:'Inter',sans-serif;font-size:14.5px;padding:12px 15px;border:1px solid var(--line);border-radius:100px;background:var(--paper);outline:none;}
.chat-input input:focus{border-color:var(--accent);}
.chat-send{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#FBF7EE;border:none;cursor:pointer;flex:none;display:grid;place-items:center;}
.chat-send:hover{background:var(--accent-dk);}
.chat-send:disabled{opacity:.4;cursor:not-allowed;}
/* conversational onboarding (coach chat, with its own slim header) */
.obc-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;height:54px;padding:0 16px;border-bottom:1px solid var(--line);background:rgba(233,228,216,.92);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;}
.obc-bar .brand .name{font-size:14.5px;}
.obc-step{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;color:var(--slate);text-transform:uppercase;white-space:nowrap;}
.ob-chat-shell{height:calc(100vh - 54px);}

/* ===== plan ===== */
.weeks-rail{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;margin-bottom:24px;}
.wk{flex:none;width:78px;border:1px solid var(--line);border-radius:var(--radius);padding:12px 10px;text-align:center;cursor:pointer;background:var(--paper);transition:all .12s;}
.wk:hover{border-color:var(--slate);}
.wk.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.wk.on .ph{color:var(--paper);}
.wk .wn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--slate);}
.wk.on .wn{color:rgba(243,239,229,.7);}
.wk .km{font-family:'Inter Tight';font-weight:600;font-size:18px;margin:5px 0 3px;font-variant-numeric:tabular-nums;}
.wk .ph{font-size:10px;color:var(--slate);}
.wk.done .wn::after{content:" ✓";color:var(--olive);}
.load-bar{height:8px;background:var(--line-soft);border-radius:4px;overflow:hidden;margin:8px 0;}
.load-bar i{display:block;height:100%;background:var(--olive);border-radius:4px;}
.day-row{display:grid;grid-template-columns:54px 1fr auto;gap:16px;padding:16px 22px;border-bottom:1px solid var(--line-soft);align-items:start;}
.day-row:last-child{border-bottom:0;}
.day-row .dn{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);letter-spacing:.1em;padding-top:2px;}
.day-row .dt{font-family:'Inter Tight';font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.day-row .dd{font-size:13px;color:var(--slate);}
.day-row .dnote{font-size:12px;color:var(--ink-soft);margin-top:6px;display:flex;gap:7px;align-items:flex-start;}
.day-row .dnote .ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex:none;margin-top:6px;}
.day-row .ds{font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right;white-space:nowrap;}
.day-row .ds.done{color:var(--olive);}
.day-row .ds.plan{color:var(--slate);}
.wtype{width:7px;height:7px;border-radius:50%;display:inline-block;flex:none;}

/* ===== activities history ===== */
.hist-controls{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.search-box{position:relative;flex:1;max-width:340px;}
.search-box input{width:100%;font-size:14px;padding:10px 14px 10px 38px;border:1px solid var(--line);border-radius:100px;background:var(--paper);outline:none;}
.search-box input:focus{border-color:var(--accent);}
.search-box .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--slate);}
.hist-list{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--paper);}
.hist-row{display:grid;grid-template-columns:64px 28px 1fr auto auto;gap:16px;align-items:center;padding:14px 20px;border-bottom:1px solid var(--line-soft);cursor:pointer;transition:background .12s;}
.hist-row:last-child{border-bottom:0;}
.hist-row:hover{background:var(--paper-2);}
.hist-row .hd{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--slate);letter-spacing:.06em;text-align:center;line-height:1.3;}
.hist-row .hd b{display:block;color:var(--ink);font-size:14px;}
.hist-row .ti{width:28px;height:28px;border:1.5px solid var(--line);border-radius:50%;display:grid;place-items:center;color:var(--slate);}
.hist-row .hn{font-family:'Inter Tight';font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hist-row .hm{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);margin-top:3px;}
.hist-row .htss{text-align:right;font-family:'Inter Tight';font-weight:600;font-size:16px;font-variant-numeric:tabular-nums;}
.hist-row .htss u{display:block;text-decoration:none;font-family:'JetBrains Mono';font-size:8px;color:var(--slate);letter-spacing:.16em;}

/* ===== settings ===== */
.settings-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:28px;}
.settings-tabs button{font-family:'Inter Tight';font-weight:600;font-size:15px;padding:0 20px 13px;background:none;border:none;color:var(--slate);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.settings-tabs button:first-child{padding-left:0;}
.settings-tabs button.on{color:var(--ink);border-bottom-color:var(--accent);}
.set-block{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:26px 28px;margin-bottom:22px;max-width:640px;}
.set-block h3{font-size:16px;margin-bottom:6px;}
.set-block .bd{font-size:13px;color:var(--slate);margin-bottom:20px;}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line-soft);gap:16px;}
.set-row:last-child{border-bottom:0;}
.set-row .sl{font-size:14px;}
.set-row .sl small{display:block;color:var(--slate);font-size:12px;margin-top:2px;}
.conn-status{display:flex;align-items:center;gap:10px;font-size:14px;}
.conn-status .ok{color:var(--olive);font-weight:600;}
.danger-row{display:flex;gap:12px;flex-wrap:wrap;}
.btn.danger{background:transparent;color:var(--rust);border-color:var(--rust);}
.btn.danger:hover{background:var(--rust);color:#FBF7EE;}

/* ===== modal ===== */
.overlay{position:fixed;inset:0;background:rgba(40,40,32,.42);backdrop-filter:blur(2px);z-index:100;display:grid;place-items:center;padding:20px;animation:fade .15s;}
@keyframes fade{from{opacity:0;}}
.modal{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);max-width:440px;width:100%;padding:30px 30px;box-shadow:0 20px 60px rgba(40,40,32,.25);}
.modal h3{font-size:21px;margin-bottom:12px;}
.modal p{color:var(--slate);font-size:14px;line-height:1.55;margin-bottom:20px;}
.modal .mfoot{display:flex;gap:12px;justify-content:flex-end;margin-top:8px;}
.modal-icon{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;margin-bottom:18px;}
.modal-icon.ok{background:rgba(110,118,68,.14);color:var(--olive);}
.modal-icon.proc{border:2px solid var(--line);border-top-color:var(--accent);animation:spin .7s linear infinite;}

/* toast */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:10px;align-items:center;}
.toast{background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:100px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(40,40,32,.3);animation:toastin .25s;}
.toast .tk{color:var(--olive);}
@keyframes toastin{from{transform:translateY(14px);opacity:0;}}

.center-narrow{max-width:560px;margin:0 auto;}
.spacer{height:52px;}

/* ===== dashboard · enhanced body metrics ===== */
.bsec{margin-bottom:14px;}
.bsec-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin:0 0 10px;}
.bsec-head .bt{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--ink-soft);text-transform:uppercase;font-weight:500;}
.bsec-head .bt b{color:var(--accent);font-weight:500;}
.bsec-head .bm-meta{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--slate);}

.bmetrics{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--paper);}
.bm{padding:15px 17px 16px;border-right:1px solid var(--line);position:relative;min-height:122px;display:flex;flex-direction:column;}
.bm:last-child{border-right:0;}
.bm .k{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.13em;color:var(--slate);text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.bm .k .pin{margin-left:auto;font-size:8.5px;letter-spacing:.1em;color:var(--slate-lt);}
.bm .v{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:30px;letter-spacing:-.03em;line-height:1;margin:11px 0 0;font-variant-numeric:tabular-nums;}
.bm .v u{text-decoration:none;font-size:12px;color:var(--slate);font-weight:500;margin-left:3px;}
.bm .v small{font-size:13px;color:var(--slate-lt);font-weight:500;letter-spacing:0;}
.bm .d{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--slate);display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:7px;}
.bm .d .up{color:var(--olive);}.bm .d .dn{color:var(--accent);}
.bm .d .flat{color:var(--taupe);}
.bm .sub{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--slate);margin-top:auto;padding-top:8px;line-height:1.5;letter-spacing:.02em;}
.bm .spark{position:absolute;right:15px;top:14px;opacity:.85;}
.bm.sm{min-height:96px;}
.bm.sm .v{font-size:23px;margin-top:9px;}

/* status dot (HRV / health color coding) */
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:none;}
.sdot.g{background:var(--olive);}.sdot.y{background:#C39A22;}.sdot.r{background:var(--rust);}

/* mini stacked bar (intensity / sleep / zones) */
.stack{display:flex;height:7px;border-radius:2px;overflow:hidden;margin:9px 0 5px;background:var(--line-soft);}
.stack i{display:block;height:100%;}
.stack.tall{height:9px;}
.stack-key{display:flex;gap:10px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--slate);letter-spacing:.04em;}
.stack-key span{display:flex;align-items:center;gap:4px;}
.stack-key i{width:8px;height:8px;border-radius:2px;display:block;}

/* body battery drain */
.batt{position:relative;height:8px;border-radius:2px;background:var(--line-soft);overflow:hidden;margin:10px 0 5px;}
.batt i{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,var(--olive),#C39A22 62%,var(--accent));}

/* zone bar for activity rows */
.zbar{display:flex;height:5px;width:84px;border-radius:2px;overflow:hidden;background:var(--line-soft);margin-top:5px;}
.zbar i{display:block;height:100%;}

/* enhanced activity rows */
.act.rich{grid-template-columns:38px 1fr auto;align-items:start;}
.act.rich .info .m{margin-top:4px;}
.act.rich .info .z{margin-top:6px;display:flex;align-items:center;gap:8px;}
.act.rich .info .z .zlbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--slate-lt);letter-spacing:.12em;}
.metasplit{display:flex;gap:9px;flex-wrap:wrap;}
.metasplit b{color:var(--ink-soft);font-weight:500;}

/* training focus annotation */
.focus-note{display:flex;gap:9px;align-items:flex-start;padding:11px 16px;border-top:1px solid var(--line-soft);font-family:'Inter',sans-serif;font-size:12.5px;color:var(--ink-soft);line-height:1.5;background:var(--paper-2);}
.focus-note .fdot{width:7px;height:7px;border-radius:2px;background:var(--olive);flex:none;margin-top:5px;}
.focus-note b{color:var(--ink);font-weight:600;}

/* chart zone bands legend chips */
.zone-chips{display:flex;gap:12px;flex-wrap:wrap;padding:0 22px 2px;}
.zone-chips span{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--slate);display:flex;align-items:center;gap:6px;letter-spacing:.04em;}
.zone-chips i{width:11px;height:9px;border-radius:1px;display:block;}

/* HRV trend card */
.hrv-foot{display:flex;justify-content:space-between;align-items:center;padding:10px 22px 16px;gap:14px;}
.hrv-foot .lo{display:flex;flex-direction:column;gap:3px;}
.hrv-foot .big{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:30px;line-height:1;font-variant-numeric:tabular-nums;}
.hrv-foot .big u{text-decoration:none;font-size:12px;color:var(--slate);font-weight:500;}
.hrv-foot .st{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--slate);display:flex;align-items:center;gap:6px;}
.hrv-vals{display:flex;gap:9px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--slate-lt);flex-wrap:wrap;justify-content:flex-end;max-width:170px;}
.hrv-vals b{color:var(--ink-soft);font-weight:500;}

/* sleep deep dive (collapsible) */
.sleep-card{margin-top:26px;}
.sleep-toggle{cursor:pointer;user-select:none;}
.sleep-toggle:hover{background:var(--paper-2);}
.sleep-toggle .ic{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:17px;transition:transform .2s;flex:none;margin-left:4px;}
.sleep-card.open .sleep-toggle .ic{transform:rotate(45deg);}
.sleep-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.sleep-card.open .sleep-body{max-height:1400px;}
.sleep-inner{padding:18px 22px 22px;}
.sleep-top{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
.sleep-top .lo{display:flex;gap:26px;flex-wrap:wrap;}
.sleep-stat .n{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:24px;line-height:1;font-variant-numeric:tabular-nums;}
.sleep-stat .n u{text-decoration:none;font-size:12px;color:var(--slate);font-weight:500;}
.sleep-stat .l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.13em;color:var(--slate);text-transform:uppercase;margin-top:5px;}
.nights{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin:6px 0 4px;}
.night{display:flex;flex-direction:column;align-items:center;gap:7px;}
.night .col{width:100%;max-width:34px;height:110px;display:flex;flex-direction:column-reverse;border-radius:2px;overflow:hidden;background:var(--line-soft);}
.night .col i{display:block;width:100%;}
.night .dl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--slate);}
.night .sc{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--ink);}
.night .ef{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--slate-lt);}
.night.low .sc{color:var(--accent);}

@media (max-width:980px){
  .bmetrics{grid-template-columns:repeat(2,1fr);}
  .bm:nth-child(2n){border-right:0;}
  .bm:nth-child(1),.bm:nth-child(2){border-bottom:1px solid var(--line);}
  .bm.sm:nth-child(1),.bm.sm:nth-child(2){border-bottom:1px solid var(--line);}
  .lp-hero-grid,.dash-main,.pricing,.features,.steps{grid-template-columns:1fr;}
  .metrics{grid-template-columns:repeat(2,1fr);}
  .metric:nth-child(2){border-right:0;}
  .metric:nth-child(1),.metric:nth-child(2){border-bottom:1px solid var(--line);}
  .lp-hero h1{font-size:44px;}.lp-section .lp-st h2{font-size:30px;}
  .step{border-right:0;border-bottom:1px solid var(--line);}
  .mgrid{grid-template-columns:repeat(2,1fr);}
  .topnav{display:none;}
  .cmp-scroll{overflow-x:auto;}
}
@media (max-width:560px){
  .wrap{padding:0 18px;}
  .lp-hero h1{font-size:36px;}
  .metrics{grid-template-columns:1fr;}
  .metric{border-right:0;border-bottom:1px solid var(--line);}
  .bmetrics{grid-template-columns:1fr;}
  .bm{border-right:0;border-bottom:1px solid var(--line);}
  .nights{grid-template-columns:repeat(7,1fr);gap:4px;}
  .night .col{height:88px;}
  .mgrid{grid-template-columns:1fr;}
  .hist-row{grid-template-columns:52px 1fr auto;}
  .hist-row .ti{display:none;}
}

/* ============================================================
   COACH-FIRST REDESIGN
   ============================================================ */
/* --- section label --- */
.dsec{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin:30px 0 14px;}
.dsec .dl{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;color:var(--ink-soft);text-transform:uppercase;font-weight:500;}
.dsec .dr{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:var(--slate);}
.dsec .dr.lnk{color:var(--accent);cursor:pointer;}
.dsec .dr.lnk:hover{text-decoration:underline;}

/* --- goal banner (north star) --- */
.goal-banner{position:relative;overflow:hidden;background:linear-gradient(135deg,#3A3A2D,#2B2B22);color:#F3EFE5;border-radius:var(--radius);padding:22px 26px 20px;}
.goal-banner::after{content:"";position:absolute;inset:0;background-image:radial-gradient(120% 120% at 100% 0,rgba(217,112,58,.20),transparent 55%);pointer-events:none;}
.gb-top{position:relative;display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap;}
.gb-race{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:21px;letter-spacing:-.02em;display:flex;align-items:center;gap:12px;}
.gb-race .gflag{font-size:13px;}
.gb-date{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;color:rgba(243,239,229,.62);}
.gb-bar{position:relative;height:12px;border-radius:6px;background:rgba(243,239,229,.13);overflow:hidden;margin:16px 0 8px;}
.gb-bar i{display:block;height:100%;background:linear-gradient(90deg,#7e8650,#9aa35c);border-radius:6px;}
.gb-bar .ticks{position:absolute;inset:0;display:flex;}
.gb-bar .ticks span{flex:1;border-right:1px solid rgba(43,43,34,.5);}
.gb-bar .ticks span:last-child{border-right:0;}
.gb-meta{position:relative;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-top:12px;}
.gb-weeks{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:rgba(243,239,229,.78);}
.gb-weeks b{color:#F3EFE5;font-weight:600;}
.gb-proj{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:rgba(243,239,229,.7);}
.gb-proj b{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:17px;color:#F3EFE5;letter-spacing:-.01em;}
.gb-status{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#cdd49a;background:rgba(110,118,68,.30);border:1px solid rgba(154,163,92,.5);padding:5px 11px;border-radius:100px;}

/* --- coach narrative card --- */
.coach-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);margin-top:24px;}
.cc-head{display:flex;align-items:center;gap:11px;padding:18px 24px 0;}
.cc-head .ai-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none;}
.cc-head h3{font-size:15px;}
.cc-head .badge{margin-left:auto;}
.coach-body{padding:14px 24px 22px;}
.coach-body p{font-size:15px;line-height:1.72;color:var(--ink-soft);margin:0 0 6px;}
.coach-body b{color:var(--ink);font-weight:600;}

/* inline expandable insight */
.ins{border-bottom:1px dashed rgba(217,112,58,.55);padding-bottom:1px;white-space:nowrap;}
.ix{display:inline-grid;place-items:center;width:17px;height:17px;margin-left:4px;border:1px solid var(--accent);color:var(--accent);background:transparent;border-radius:4px;font-size:9px;line-height:1;cursor:pointer;vertical-align:middle;padding:0;transition:transform .18s,background .14s,color .14s;}
.ix:hover{background:var(--accent);color:#FBF7EE;}
.ix.open{transform:rotate(90deg);background:var(--accent);color:#FBF7EE;}
.ins-panel{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.ins-panel.open{max-height:360px;}
.ip-in{margin:12px 0 10px;padding:14px 16px;background:var(--paper-2);border:1px solid var(--line-soft);border-left:2px solid var(--accent);border-radius:var(--radius);}
.ip-vals{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink);letter-spacing:.02em;line-height:1.6;margin-bottom:8px;}
.ip-body{font-size:13.5px;color:var(--ink-soft);line-height:1.62;}
.ip-spark{display:block;margin:4px 0 10px;}

/* --- this week at a glance --- */
.tw-wrap{overflow-x:auto;}
.tw-table{width:100%;border-collapse:collapse;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;font-size:14px;max-width:100%;}
.tw-table th{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);font-weight:500;text-align:right;padding:13px 18px 11px;border-bottom:1px solid var(--line);}
.tw-table th:first-child{text-align:left;}
.tw-table th.now{color:var(--ink);}
.tw-table td{padding:13px 18px;border-bottom:1px solid var(--line-soft);text-align:right;font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;color:var(--slate);}
.tw-table tr:last-child td{border-bottom:0;}
.tw-table td.metric{text-align:left;font-family:'Inter Tight',sans-serif;font-weight:600;font-size:13.5px;color:var(--ink);}
.tw-table td.now{color:var(--ink);font-size:15px;font-weight:600;}
.tw-table td.now small{display:block;font-size:9.5px;font-weight:500;letter-spacing:.08em;margin-top:2px;}
.tw-table td.now small.g{color:var(--olive);}
.tw-table td.plan{color:var(--ink-soft);}

/* --- key signals --- */
.signals{display:flex;gap:9px;flex-wrap:wrap;}
.sig{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--paper);border-radius:100px;padding:8px 14px;cursor:pointer;font-size:13px;color:var(--ink-soft);transition:border-color .14s,background .14s;}
.sig:hover{border-color:var(--slate);}
.sig.on{border-color:var(--accent);background:rgba(217,112,58,.06);}
.sig .ar{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--slate-lt);margin-left:2px;}
.sig-detail{max-height:0;overflow:hidden;transition:max-height .32s ease;}
.sig-detail.open{max-height:420px;}
.sig-detail-in{margin-top:14px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;display:grid;grid-template-columns:200px 1fr;gap:24px;align-items:center;}
.sig-detail-in .sd-chart{border:1px solid var(--line-soft);border-radius:var(--radius);background:var(--paper-2);padding:10px;}
.sig-detail-in .sd-txt{font-size:14px;color:var(--ink-soft);line-height:1.62;}
.sig-detail-in .sd-txt b{color:var(--ink);font-weight:600;}
@media (max-width:680px){ .sig-detail-in{grid-template-columns:1fr;} }

/* --- recent activities (coach-first compact) --- */
.ract{display:grid;grid-template-columns:44px 1fr auto;gap:14px;align-items:start;padding:14px 0;border-bottom:1px solid var(--line-soft);cursor:pointer;}
.ract:last-child{border-bottom:0;}
.ract:hover{background:var(--paper-2);margin:0 -16px;padding:14px 16px;border-radius:var(--radius);}
.ract .rday{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--slate);text-align:center;line-height:1.25;padding-top:2px;}
.ract .rday b{display:block;color:var(--ink);font-size:14px;}
.ract .rt{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ract .rm{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);margin-top:3px;}
.ract .rc{font-size:12.5px;color:var(--ink-soft);margin-top:6px;display:flex;gap:7px;align-items:flex-start;line-height:1.45;}
.ract .rc .ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex:none;margin-top:5px;}
.ract .rtss{text-align:right;white-space:nowrap;}
.ract .rtss b{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:16px;font-variant-numeric:tabular-nums;}
.ract .rtss u{display:block;text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--slate);letter-spacing:.16em;}

/* --- activity detail: coach-first --- */
.ad-ctx{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--accent);}
.data-toggle{cursor:pointer;user-select:none;}
.data-toggle:hover{background:var(--paper-2);}
.data-toggle .ic{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:17px;transition:transform .2s;flex:none;}
.data-card.open .data-toggle .ic{transform:rotate(45deg);}
.data-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.data-card.open .data-body{max-height:2400px;}
.data-sub{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;color:var(--slate);text-transform:uppercase;padding:18px 22px 0;margin-bottom:-4px;}

/* --- plan: road to paris timeline --- */
.road-head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:18px;}
.wk{position:relative;width:84px;}
.wk .phl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--slate-lt);text-transform:uppercase;margin-top:5px;}
.wk.on .phl{color:rgba(243,239,229,.7);}
.wk.past{opacity:.62;}
.wk.past .km{color:var(--ink-soft);}
.wk .av{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--olive);margin-top:2px;}
.wk.on .av{color:#cdd49a;}
.wk.cur-wk{border-color:var(--accent);border-width:1.5px;}
.wk .nowtag{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--accent);color:#FBF7EE;font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.12em;padding:2px 6px;border-radius:100px;white-space:nowrap;}
.phase-strip{display:flex;gap:0;margin:0 0 16px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.1em;}
.phase-strip span{flex:1;text-align:center;padding:7px 4px;color:var(--slate);border-right:1px solid var(--line-soft);text-transform:uppercase;}
.phase-strip span:last-child{border-right:0;}
.phase-strip span.cur{background:var(--ink);color:var(--paper);}
.day-row .ds.adj{color:var(--accent);}
.coach-week-note{display:flex;gap:10px;align-items:flex-start;padding:16px 22px;border-bottom:1px solid var(--line-soft);background:rgba(217,112,58,.05);font-size:14px;color:var(--ink-soft);line-height:1.6;}
.coach-week-note .ai-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none;margin-top:5px;}
.coach-week-note b{color:var(--ink);font-weight:600;}

/* --- data explorer --- */
.xq{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:22px;overflow:hidden;}
.xq-head{padding:20px 24px 0;}
.xq-head h3{font-size:19px;letter-spacing:-.01em;}
.xq-head .xqs{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--accent);text-transform:uppercase;margin-bottom:6px;}
.xq-interp{display:flex;gap:11px;align-items:flex-start;padding:16px 24px 22px;font-size:14px;color:var(--ink-soft);line-height:1.62;}
.xq-interp .ai-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none;margin-top:5px;}
.xq-interp b{color:var(--ink);font-weight:600;}
@media (max-width:560px){
  .goal-banner{padding:18px;}
  .gb-race{font-size:18px;}
  .ract:hover{margin:0;padding:14px 0;}
}

/* ============================================================
   MOBILE-FIRST REDESIGN
   The real product is a phone app. Mobile (375px) is the primary
   target; desktop shows the same phone layout (420px) centered on
   the warm stone field. Everything below overrides the desktop
   styles above so the phone layout wins at every viewport.
   ============================================================ */

/* --- the phone canvas: centered 420px frame on desktop, full-bleed on phone --- */
body{background-attachment:fixed;}
#app{
  position:relative;max-width:420px;margin:0 auto;min-height:100vh;
  background-color:var(--bg);
  background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
  background-size:32px 32px,32px 32px;background-position:-1px -1px;
  box-shadow:0 0 0 1px var(--line-soft),0 30px 90px -28px rgba(56,56,44,.42);
}

/* gutters: the frame constrains width, so .wrap only adds side padding */
.wrap{max-width:none;padding:0 16px;}
.wrap-narrow{max-width:none;}
.chat-inner,.chat-foot-inner{max-width:none;padding-left:16px;padding-right:16px;}

/* --- slim top bar: logo + avatar only --- */
.topnav{display:none!important;}
.topbar .row{height:54px;gap:10px;}
.brand .name{font-size:14.5px;}

/* --- single-column / phone grids (mobile-first) --- */
.lp-hero-grid,.dash-main,.steps,.features,.pricing,.sig-detail-in{grid-template-columns:1fr!important;}
.steps{gap:0;}
.step{border-right:0;border-bottom:1px solid var(--line);}
.step:last-child{border-bottom:0;}
.features{gap:14px;}
.metrics,.mgrid,.bmetrics{grid-template-columns:repeat(2,1fr)!important;}
.metric:nth-child(2n),.mcell:nth-child(2n),.bm:nth-child(2n){border-right:0;}
.metric,.mcell,.bm{border-bottom:1px solid var(--line-soft);}
/* any remaining inline 3-up grids stack on the phone */
[style*="1fr 1fr 1fr"]{grid-template-columns:1fr!important;}

/* --- phone-scale typography --- */
.lp-hero{padding:40px 0 36px;}
.lp-hero h1{font-size:32px;line-height:1.05;}
.lp-hero .lede{font-size:16px;}
.lp-hero .cta-row{flex-direction:column;align-items:stretch;}
.lp-hero .cta-row .btn{width:100%;}
.lp-section{padding:44px 0;}
.lp-section .lp-st h2{font-size:26px;}
.page{padding:22px 0 92px;}            /* bottom clearance for the nav bar */
.page-head h2{font-size:24px;}
.metric .v{font-size:32px;}            /* metric values larger for the phone */
.tss-big b{font-size:30px;}
.gb-proj b{font-size:22px;}            /* projected finish, prominent */
.ad-head h2{font-size:24px;}

/* --- horizontal-scroll regions on the phone --- */
.cmp-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cmp{max-width:100%;}
.suggest{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.suggest .chip-btn{flex:none;}

/* --- touch targets ≥ 44px --- */
.btn{padding:13px 22px;min-height:46px;}
.btn.sm{min-height:40px;padding:10px 16px;}
.chip-btn,.sig,.faq-q .ic{min-height:40px;}
.faq-q{min-height:54px;}
.modal{max-width:380px;}

/* --- chat fits between the top bar and the bottom nav --- */
.chat-shell{height:calc(100vh - 54px - 62px);}

/* --- BOTTOM NAVIGATION (persistent on app screens) --- */
.bottomnav{
  position:fixed;left:50%;transform:translateX(-50%);bottom:0;z-index:60;
  width:100%;max-width:420px;height:62px;display:flex;
  background:rgba(243,239,229,.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
}
.bottomnav .bn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  font-family:'Inter Tight',sans-serif;font-weight:600;font-size:10.5px;letter-spacing:.01em;
  color:var(--slate);cursor:pointer;text-decoration:none;
}
.bottomnav .bn svg{width:22px;height:22px;display:block;}
.bottomnav .bn.on{color:var(--accent);}
.bottomnav .bn:active{background:var(--paper-2);}

/* --- "More" bottom sheet --- */
.sheet-ov{position:fixed;inset:0;z-index:120;background:rgba(40,40,32,.42);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center;animation:fade .15s;}
.sheet{width:100%;max-width:420px;background:var(--paper);border:1px solid var(--line);border-bottom:0;border-top-left-radius:16px;border-top-right-radius:16px;padding:8px 0 max(14px,env(safe-area-inset-bottom));animation:sheetup .24s cubic-bezier(.2,.7,.3,1);box-shadow:0 -16px 50px rgba(40,40,32,.22);}
@keyframes sheetup{from{transform:translateY(100%);}}
.sheet .grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:7px auto 8px;}
.sheet .sh-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--slate);text-transform:uppercase;padding:6px 22px 8px;}
.sheet .si-row{display:flex;align-items:center;gap:14px;padding:0 22px;min-height:56px;font-family:'Inter Tight',sans-serif;font-size:15.5px;font-weight:500;color:var(--ink);cursor:pointer;border-top:1px solid var(--line-soft);}
.sheet .si-row:active{background:var(--paper-2);}
.sheet .si-row .ic{width:24px;display:grid;place-items:center;color:var(--slate);flex:none;}
.sheet .si-row.danger{color:var(--accent);}
.sheet .si-row.danger .ic{color:var(--accent);}

/* toasts float above the bottom nav */
.toast-wrap{bottom:80px;}

/* --- PUSH TO WATCH --- */
.watch-block{margin:2px 0 20px;}
.btn.watch-cta{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;}
.watch-cta .wb-ic{display:inline-flex;}
.watch-banner{display:flex;align-items:center;gap:12px;background:rgba(110,118,68,.10);border:1px solid rgba(110,118,68,.40);border-radius:var(--radius);padding:13px 15px;}
.watch-banner .wb-ic{color:var(--olive);flex:none;}
.watch-banner b{display:block;font-family:'Inter Tight',sans-serif;font-weight:600;font-size:14px;color:var(--ink);}
.watch-banner .wb-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--slate);letter-spacing:.02em;line-height:1.4;}
.watch-banner .link{margin-left:auto;flex:none;font-size:13px;white-space:nowrap;}
.day-row .dt .wicon{margin-left:auto;display:inline-flex;flex:none;}
.modal-icon.warn{background:rgba(196,97,47,.14);color:var(--rust);}

/* compact the dense app rows for the phone width (the desktop 560px
   media query never fires inside the always-wide phone-preview viewport) */
.hist-row{grid-template-columns:54px 1fr auto auto!important;gap:12px;padding:14px 16px;}
.hist-row .ti{display:none;}
.day-row{grid-template-columns:44px 1fr auto;gap:10px;padding:14px 16px;}
.day-row .ds{white-space:normal;text-align:right;}
.act.rich{grid-template-columns:34px 1fr auto;}
.hist-controls .search-box{max-width:none;}
.settings-tabs button,.auth-card .tabs button{min-height:44px;}
.set-block{padding:22px 18px;}

/* very small phones: keep the gutters tight */
@media (max-width:380px){
  .wrap{padding:0 13px;}
  .lp-hero h1{font-size:29px;}
}

/* ============================================================
   DESKTOP-ONLY ELEMENTS — present in the DOM at every width,
   but hidden until the ≥1024px shell takes over below.
   ============================================================ */
.desktop-sidebar{display:none;}
.chat-context{display:none;}
.auth-brand{display:none;}
.sig-spark{display:none;}
/* mobile: the split wrappers are passthroughs that keep the card centered */
.auth-split{display:grid;place-items:center;width:100%;}

/* ============================================================
   DESKTOP LAYOUT (≥1024px)
   A fixed 240px sidebar replaces the top bar + bottom nav on app
   screens, and the original wide-screen grids — squashed by the
   mobile-first block above — are restored so the 1200px main
   content can breathe. Landing & auth get proper desktop spacing.
   ============================================================ */
@media (min-width:1024px){
  /* ---- un-frame the app: full-bleed page, drop the phone shell ---- */
  #app{max-width:none;margin:0;min-height:100vh;background:none;box-shadow:none;}
  .app-main{min-height:100vh;}
  .app-main.with-side{margin-left:240px;}

  /* ---- restore generous gutters & content widths ---- */
  .wrap{max-width:1140px;margin:0 auto;padding:0 40px;}
  .with-side .wrap{max-width:1200px;}
  .wrap-narrow{max-width:460px;}
  .chat-inner,.chat-foot-inner{max-width:840px;padding-left:34px;padding-right:34px;}

  /* ---- chrome: hide the phone top bar & bottom nav on app screens,
         restore the landing/auth top nav ---- */
  .with-side .topbar{display:none;}
  .bottomnav{display:none!important;}
  .topnav{display:flex!important;}
  .topbar .row{height:64px;}

  /* ============================================================
     THE SIDEBAR
     ============================================================ */
  .desktop-sidebar{
    display:flex;flex-direction:column;justify-content:space-between;
    position:fixed;left:0;top:0;bottom:0;width:240px;z-index:50;
    background:var(--paper);border-right:1px solid var(--line);
    padding:26px 0 18px;
  }
  .sb-brand{padding:0 22px 4px;margin-bottom:26px;}
  .sb-brand .glyph{width:28px;height:28px;}
  .sb-brand .name{font-size:16px;}
  .sb-nav{display:flex;flex-direction:column;}
  .sb-link{
    position:relative;display:block;font-family:'Inter Tight',sans-serif;font-weight:600;
    font-size:14.5px;color:var(--slate);text-decoration:none;cursor:pointer;
    padding:11px 22px;border-left:2px solid transparent;transition:color .14s,background .14s;
  }
  .sb-link:hover{color:var(--ink);background:var(--paper-2);}
  .sb-link.on{color:var(--ink);background:rgba(217,112,58,.07);border-left-color:var(--accent);}
  .sb-sep{height:1px;background:var(--line-soft);margin:10px 22px;}
  .sb-athlete{display:flex;align-items:center;gap:12px;padding:16px 18px 4px;margin:0 4px;border-top:1px solid var(--line-soft);cursor:pointer;}
  .sb-athlete:hover .sb-ath-name{color:var(--accent);}
  .sb-av{width:40px;height:40px;font-size:14px;flex:none;}
  .sb-ath-name{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:14.5px;color:var(--ink);transition:color .14s;}
  .sb-ath-sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--slate);margin-top:2px;}
  .sb-ath-sub .sb-prem{color:var(--accent);font-weight:600;}

  /* ============================================================
     RESTORE THE WIDE-SCREEN GRIDS (override mobile-first !important)
     ============================================================ */
  .lp-hero-grid{grid-template-columns:1.05fr .95fr!important;}
  .dash-main{grid-template-columns:1.62fr 1fr!important;}
  .steps{grid-template-columns:repeat(3,1fr)!important;}
  .features{grid-template-columns:repeat(3,1fr)!important;gap:24px!important;}
  .pricing{grid-template-columns:repeat(2,1fr)!important;}

const $ = sel => document.querySelector(sel);
const app = () => document.getElementById('app');
function go(route){ location.hash = route; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function toast(msg, ok=true){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = (ok?'<span class="tk">✓</span>':'<span style="color:var(--accent)">!</span>') + esc(msg);
  root.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s,transform .3s'; el.style.opacity='0'; el.style.transform='translateY(8px)'; setTimeout(()=>el.remove(),300); }, 2600);
}

function modal(html){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="overlay" id="ov">${html}</div>`;
  root.querySelector('#ov').addEventListener('click', e=>{ if(e.target.id==='ov') closeModal(); });
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

function dist(km){ return state.units==='km' ? km.toFixed(1)+' km' : (km*0.621371).toFixed(1)+' mi'; }

function validEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
function setErr(id,msg){ const e=document.getElementById('err-'+id); if(e)e.textContent=msg; const f=document.getElementById(id); if(f)f.classList.toggle('err',!!msg); }

function submitSignup(ev){
  ev.preventDefault();
  const email=$('#su-email').value.trim(), p=$('#su-pass').value, p2=$('#su-pass2').value;
  let ok=true;
  if(!validEmail(email)){ setErr('su-email','Enter a valid email address'); ok=false;} else setErr('su-email','');
  if(p.length<8){ setErr('su-pass','Password must be at least 8 characters'); ok=false;} else setErr('su-pass','');
  if(p2!==p){ setErr('su-pass2','Passwords do not match'); ok=false;} else setErr('su-pass2','');
  if(!ok) return false;
  toast("Account created");
  go('onboarding');
  return false;
}
function submitLogin(ev){
  ev.preventDefault();
  const email=$('#li-email').value.trim(), p=$('#li-pass').value;
  let ok=true;
  if(!validEmail(email)){ setErr('li-email','Enter a valid email address'); ok=false;} else setErr('li-email','');
  if(p.length<8){ setErr('li-pass','Password must be at least 8 characters'); ok=false;} else setErr('li-pass','');
  if(!ok) return false;
  toast("Welcome back, Marc");
  state.garminConnected=true;
  go('dashboard');
  return false;
}
function doForgot(){
  const email = $('#li-email') ? $('#li-email').value.trim() : '';

}

  opts = opts || {};
  const c = state.coachOnb;
  c.typing = true; c.chips = []; c.inputEnabled = false; c.cta = null;
  renderCoachOnbOnly();
  setTimeout(()=>{
    c.typing = false;
    c.messages.push({from:'coach', text});
    c.chips = opts.chips || [];
    c.cta = opts.cta || null;
    c.inputEnabled = !c.cta;            // free text allowed unless we're at the hand-off
    c.placeholder = opts.placeholder || 'Type your answer…';
    renderCoachOnbOnly();
  }, opts.delay || (1000 + Math.random()*700));
}

function startCoachOnboard(){
  state.coachOnb = freshCoachOnb();
  coachPush(OB_WELCOME, {chips:OB_GOAL_CHIPS});
}

/* input — a chip click or free text both feed the same engine */
function coachOnbChip(i){ const ch=state.coachOnb.chips[i]; if(ch) coachOnbInput(ch.value, ch.label); }
function coachOnbSubmit(ev){
  ev.preventDefault();
  const f=document.getElementById('ob-field'); const v=(f?f.value:'').trim();
  if(!v) return false;
  coachOnbInput(v, v);
  return false;
}
function coachOnbInput(value, label){
  const c = state.coachOnb;
  if(c.cta) return;                      // conversation already handed off
  c.messages.push({from:'user', text:esc(label)});
  c.chips = []; c.inputEnabled = false;
  renderCoachOnbOnly();
  coachOnbAdvance(value, label);
}

/* map free text (or a chip value) to a goal type */
function classifyGoal(v){
  if(['race','weightloss','hyrox','triathlon','health'].includes(v)) return v;
  if(v==='notsure') return 'health';
  const t = (v||'').toLowerCase();
  if(/hyrox|crossfit|functional|hybrid|\bwod\b/.test(t)) return 'hyrox';
  if(/triathlon|ironman|70\.?3|\btri\b|swimbike|duathlon/.test(t)) return 'triathlon';
  if(/weight|lose|fat|leaner?|slim|\bkg\b|lbs|pounds|deficit/.test(t)) return 'weightloss';
  if(/race|marathon|10\s?k|5\s?k|half|ultra|sub.?\d|\bpr\b|\bpb\b|\bbq\b|qualif|parkrun|distance/.test(t)) return 'race';
  if(/health|healthy|\bfit\b|fitness|general|maintain|stay|wellbeing|well-being|sleep|stress|move/.test(t)) return 'health';
  return 'other';
}

/* the conversation state machine */
function coachOnbAdvance(value, label){
  const c = state.coachOnb;
  switch(c.step){
    case 'welcome':{
      const kind = classifyGoal(value);
      c.goalKind = kind;
      if(kind==='race'){ c.step='race_distance';
        return coachPush("Love it — a race gives us a finish line to build toward. What distance, and roughly when?", {chips:OB_RACE_CHIPS}); }
      if(kind==='weightloss'){ c.step='wl_target';
        return coachPush("I can help with that. Body composition is mostly an energy-balance game, and your Garmin gives us the data to do it properly. What's your target weight?", {placeholder:'e.g. 78 kg'}); }
      if(kind==='hyrox'){ c.step='hyrox_equip';
        return coachPush("Hyrox demands hybrid fitness — running compromised with strength endurance. Your running base is solid (<b>42 km/week</b>), but I don't see structured strength work in your Garmin data. What's your access to equipment?", {chips:OB_EQUIP_CHIPS}); }
      if(kind==='triathlon'){ c.step='tri_distance';
        return coachPush("Nice — three sports, three times the fun. What distance are you targeting — Sprint, Olympic, 70.3, or Ironman?", {chips:OB_TRI_CHIPS}); }
      if(kind==='health'){ c.step='health_confirm';
        return coachPush("No problem — honestly, that's a great default. Let's start with <b>General Health</b>: I'll track your sleep, HRV, daily movement and stress. The moment you have a specific goal, just tell me and I'll adapt. Sound good?", {chips:[{label:"Sounds good →",value:"ok"}]}); }
      // graceful catch-all for anything unexpected ("I want to climb Everest")
      c.step='other_confirm';
      return coachPush(`<b>${esc(label)}</b> — I love the ambition. 🙌 I don't have a pre-built plan for that exact goal yet, but the engine underneath is always the same: build your aerobic base, stay durable, recover well. Here's what I'd do — track your endurance and health signals now, and we sharpen the plan as the goal gets concrete. Want me to set that up?`,
        {chips:[{label:"Yes, let's do it →",value:"ok"},{label:"Pick from the list instead",value:"back"}]});
    }

    /* ---- race path ---- */
    case 'race_distance':{
      c.race = label; c.step='race_target';
      return coachPush("Got it. And what's your target — a finish time you're chasing, or just to get to the line?", {placeholder:'e.g. sub 3h30'});
    }
    case 'race_target':{
      c.target = label; c.step='done';
      const race = (c.race && c.race!=='No specific date') ? c.race : 'Marathon';
      return coachPush(`Got it. <b>Paris ${esc(race)}</b>, <b>September 14</b>, target <b>${esc(c.target)}</b>. Your current threshold pace of <b>4:24/km</b> suggests you're capable of exactly that. I'll build you a <b>12-week plan</b> that ramps your volume safely and sharpens your race pace.<br><br>Ready to start?`,
        {cta:{label:"Let's go →", variant:'marathon'}});
    }

    /* ---- weight-loss path ---- */
    case 'wl_target':{
      c.target = label; c.step='done';
      const num = (label.match(/\d+(\.\d+)?/)||['78'])[0];
      return coachPush(`<b>${esc(num)} kg</b>, from your current <b>84 kg</b> — that's a healthy, achievable goal, and about the right pace to lose it and keep it off. I'll track your energy balance, daily activity and weight trend, and keep your runs fueled enough to stay strong.<br><br>Want me to set a sustainable weekly target and get started?`,
        {cta:{label:"Start tracking →", variant:'weightloss'}});
    }

    /* ---- hyrox path ---- */
    case 'hyrox_equip':{
      c.equipment = label; c.step='hyrox_when';
      return coachPush("Perfect. I'll build you a plan that maintains your run volume but adds <b>2–3 hybrid sessions per week</b>. We'll track your running pace under fatigue, transition speed, and strength progress. When's your event?", {chips:OB_WHEN_CHIPS});
    }
    case 'hyrox_when':{
      c.when = label; c.step='done';
      return coachPush(`<b>${esc(label)}</b> — workable. Your engine's already there; now we layer in the strength endurance to match. I'll periodise the next block around your event and watch how your running holds up under the new load.<br><br>Let's build this.`,
        {cta:{label:"Let's build this →", variant:'health'}});
    }

    /* ---- triathlon path ---- */
    case 'tri_distance':{
      c.race = label; c.step='tri_when';
      return coachPush(`<b>${esc(label)}</b> it is — a real test of all-round endurance. We'll balance swim, bike and run so no discipline gets neglected, and your running base gives you a head start. When's race day?`, {chips:OB_WHEN_CHIPS});
    }
    case 'tri_when':{
      c.when = label; c.step='done';
      return coachPush(`Perfect. I'll structure your weeks around the three disciplines and protect your recovery between them. Your <b>${esc(c.race||'triathlon')}</b> plan is ready.<br><br>Ready to start?`,
        {cta:{label:"Let's go →", variant:'health'}});
    }

    /* ---- general-health path ---- */
    case 'health_confirm':{
      c.step='done';
      return coachPush("Great — I'll keep it simple and focused on the signals that keep you feeling good: sleep, recovery, daily movement and stress. No race clock, no pressure. Let's go.",
        {cta:{label:"Start →", variant:'health'}});
    }

    /* ---- graceful catch-all path ---- */
    case 'other_confirm':{
      if(value==='back'){ c.step='welcome';
        return coachPush("No problem — what are you training for?", {chips:OB_GOAL_CHIPS}); }
      c.step='done';
      return coachPush("Done. I'll start you on a flexible base — endurance and health signals tracked from day one — and the moment your goal sharpens, just tell me and I'll reshape everything around it. Let's go.",
        {cta:{label:"Start →", variant:'health'}});
    }
  }
}

/* hand off to the dashboard variant the conversation settled on */
function coachOnbFinish(){
  const c = state.coachOnb;
  const variant = (c.cta && c.cta.variant) || 'health';
  state.goalType = variant;

  toast(`Goal set · ${labels[variant]||'General Health'}`);

}

/* ============================================================
   COACH-FIRST SHARED HELPERS
   ============================================================ */
/* turn a narrative string with {{key:text}} markers into a paragraph
   plus the expandable evidence panels that belong to it */
function coachPara(str, dict, ns){
  const used=[];
  const html = str.replace(/\{\{(\w+):([^}]+)\}\}/g,(m,key,text)=>{
    used.push(key);
    return `<span class="ins">${text}<button class="ix" onclick="toggleIns('${ns}-${key}')" aria-label="Show the data">▸</button></span>`;
  });
  const panels = used.map(k=>insPanel(ns,k,dict[k])).join('');
  return `<p>${html}</p>${panels}`;
}
function insPanel(ns,key,d){
  if(!d) return '';
  const spark = d.spark ? miniSpark(d.spark, d.color||'#54513F', d.band) : '';
  return `<div class="ins-panel" id="ip-${ns}-${key}"><div class="ip-in">
    ${d.vals?`<div class="ip-vals">${d.vals}</div>`:''}
    ${spark}
    <div class="ip-body">${d.body}</div>
  </div></div>`;
}
function toggleIns(id){
  const p=document.getElementById('ip-'+id);
  if(!p) return;
  const open=p.classList.toggle('open');
  const btn=document.querySelector(`[onclick="toggleIns('${id}')"]`);
  if(btn) btn.classList.toggle('open',open);
}
/* small evidence sparkline (with optional baseline band) */
function miniSpark(vals,color,band){
  const w=190,h=42,pad=4;
  const min=Math.min(...vals), max=Math.max(...vals), rng=(max-min)||1, n=vals.length;
  const Y=v=>h-pad-((v-min)/rng)*(h-2*pad);
  const X=i=>pad+i*((w-2*pad)/(n-1));
  const pts=vals.map((v,i)=>X(i).toFixed(1)+','+Y(v).toFixed(1)).join(' ');
  let bandRect='';
  if(band){
    const top=Y(Math.min(band[1],max)), bot=Y(Math.max(band[0],min));
    bandRect=`<rect x="0" y="${top.toFixed(1)}" width="${w}" height="${Math.max(0,bot-top).toFixed(1)}" fill="#6E7644" opacity=".14"/>`;
  }
  const dots=vals.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.2" fill="${color}"/>`).join('');
  return `<svg class="ip-spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${bandRect}<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6"/>${dots}</svg>`;
}

  else if(state.goalType==='weightloss') body = dashWeightLoss();
  else if(state.goalType==='health') body = dashHealth();
  else body = dashNormal();

  return `${topbar('dashboard')}<div class="wrap"><div class="page">
    <div class="page-head">
      <div><h2>Your Progress</h2><div class="range" style="margin-top:4px">MARC D. · WEEK OF MON 10 JUN 2026</div></div>

/* ---- HRV trend card ---- */
function hrvTrendCard(){
  const w=560,h=86,pad=10;
  const min=Math.min(...HRV.vals)-3, max=Math.max(...HRV.vals)+3, rng=max-min;
  const X=i=>pad+i*((w-2*pad)/(HRV.vals.length-1));
  const Y=v=>h-pad-((v-min)/rng)*(h-2*pad);
  const pts=HRV.vals.map((v,i)=>X(i).toFixed(1)+','+Y(v).toFixed(1)).join(' ');
  const bandTop=Y(HRV.base+HRV.band), bandBot=Y(HRV.base-HRV.band);
  return `
  <div class="card" style="margin-top:26px">

        <rect x="0" y="${bandTop.toFixed(1)}" width="${w}" height="${(bandBot-bandTop).toFixed(1)}" fill="#6E7644" opacity=".10"/>
        <line x1="0" y1="${Y(HRV.base).toFixed(1)}" x2="${w}" y2="${Y(HRV.base).toFixed(1)}" stroke="#6E7644" stroke-width="1" stroke-dasharray="4 4" opacity=".5"/>
        <polyline points="${pts}" fill="none" stroke="#54513F" stroke-width="2"/>
        ${HRV.vals.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3" fill="${v>=HRV.base-HRV.band?'#6E7644':'#C39A22'}"/>`).join('')}

}

/* tiny sparkline point generator */
function sparkPts(vals,w,h,pad){
  pad=pad||2;
  const min=Math.min(...vals), max=Math.max(...vals), rng=(max-min)||1, n=vals.length;
  return vals.map((v,i)=>{
    const x=pad+i*((w-2*pad)/(n-1));
    const y=h-pad-((v-min)/rng)*(h-2*pad);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
}

function renderPlan(){

  const phases = ["Base","Build","Peak","Taper","Race"];
  const statusLine = wk.done ? `Completed · ${actual}/${planned} km · ${wk.dsess}/${wk.sess} sessions`

    </div>`:''}

    <div class="card" style="margin-bottom:22px">
      <div class="card-head">
        <h3>Week ${wk.n} of ${GOAL.weeksTotal} — ${wk.phase} Phase</h3>
        <div class="sub">${esc(statusLine.toUpperCase())}${sent?` <span style="color:var(--olive)">· ⌚ ${workouts}/${workouts} ✓</span>`:''}</div>
      </div>
      ${past?`<div style="padding:16px 22px 6px">
        <div class="load-bar"><i style="width:${pct}%;background:${wk.cur?'var(--accent)':'var(--olive)'}"></i></div>
        <div style="font-family:'JetBrains Mono';font-size:11px;color:var(--slate);display:flex;justify-content:space-between"><span>${actual} / ${planned} km</span><span style="color:${pct>=80?'var(--olive)':'var(--rust)'}">● ${pct>=80?'On track':'Behind'} · ${pct}%</span></div>

          </div>`).join('')}

    </div>
  </div></div>`;
}
/* day-by-day for a plan week — rich for the current week, generated for others */
function planDays(wk){
  if(wk.cur) return CUR_WEEK_DAYS;
  const ph=wk.phase, st=wk.done?'done':'planned';
  const long=Math.round(wk.plan*0.38);
  const q = (ph==='Taper'||ph==='Race') ? ['Race-pace strides','thr','Z4'] : ph==='Base' ? ['Tempo · 3×8min','tempo','Z3'] : ['Threshold · 6×1.2km','thr','Z4'];
  const mk=(d,t,type,desc,note)=>({d,t,type,desc,note,status:st, res:st==='done'?'✓ Completed':''});
  return [
    mk('MON','Recovery run','rec',`${Math.round(wk.plan*0.13)} km · Z1`,'Easy shakeout to open the week.'),
    mk('TUE',q[0],q[1],`${Math.round(wk.plan*0.25)} km · ${q[2]}`,"The week's key quality session — hold even effort."),
    mk('WED','Easy + strides','easy',`${Math.round(wk.plan*0.16)} km · Z2 + 6×20s`,'Keep turnover sharp between hard days.'),
    mk('THU','Rest','rest','Full rest or mobility','Recovery is where the adaptation happens.'),
    mk('FRI','Tempo','tempo',`${Math.round(wk.plan*0.20)} km · Z3`,'Marathon-effort work, controlled.'),
    mk('SAT','Easy run','easy',`${Math.round(wk.plan*0.10)} km · Z2`,'Loosen the legs before the long run.'),
    mk('SUN','Long run','long',`${long} km · Z2`, ph==='Peak'?'With marathon-pace blocks in the back half.':'Steady aerobic — negative split if you feel good.'),
  ];
}

    <h3>Why Premium?</h3>
    <div class="bd">Unlock the full coaching experience.</div>
    <ul style="list-style:none;font-size:14px;color:var(--ink-soft)">
      <li style="padding:8px 0 8px 24px;position:relative;border-bottom:1px solid var(--line-soft)"><span style="position:absolute;left:0;color:var(--olive)">✓</span>Unlimited AI coach conversations</li>
      <li style="padding:8px 0 8px 24px;position:relative;border-bottom:1px solid var(--line-soft)"><span style="position:absolute;left:0;color:var(--olive)">✓</span>Adaptive training plans</li>

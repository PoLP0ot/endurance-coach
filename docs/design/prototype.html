}
function confirmDisconnect(){
  modal(`<div class="modal">
    <h3>Disconnect Garmin?</h3>
    <p>Your existing activities will stay, but new workouts won't sync until you reconnect. You can reconnect anytime.</p>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn danger" onclick="doDisconnect()">Disconnect</button></div>
  </div>`);
}
function doDisconnect(){ state.garminConnected=false; closeModal(); toast('Garmin disconnected'); render(); }
function confirmDelete(){
  modal(`<div class="modal">
    <h3>Delete account</h3>
    <p>This permanently erases your account, activities and plans. This cannot be undone. Type <b>DELETE</b> to confirm.</p>
    <div class="field"><input id="del-confirm" placeholder="Type DELETE" oninput="document.getElementById('del-btn').disabled = this.value.trim()!=='DELETE'"></div>

function manageSub(){
  modal(`<div class="modal">

    <h3 id="ms-title">Opening billing portal…</h3>
    <p id="ms-body">Redirecting you to the secure subscription portal.</p>

  setTimeout(()=>{
    document.getElementById('ms-spin').className='modal-icon ok';
    document.getElementById('ms-spin').innerHTML='✓';
    document.getElementById('ms-title').textContent='Subscription portal';
    document.getElementById('ms-body').innerHTML='Premium · '+(state.billingMonthly?'$8/mo':'$79/yr')+'. You can change plan or cancel below.';

function cancelSub(){ state.premium=false; closeModal(); toast('Subscription cancelled'); render(); }

/* ============================================================

function startCheckout(){

  modal(`<div class="modal">

/* ============================================================
   SCREEN 11 — DATA EXPLORER ("Signals")
   organized by QUESTION, never data without context
   ============================================================ */
function renderExplore(){
  return `${topbar('explore')}<div class="wrap"><div class="page">

    <div class="xq-grid">

        <span><i style="background:#6E7644"></i>Fitness · CTL</span>

    <div class="xq">
      <div class="xq-head"><div class="xqs">Recovery</div><h3>Am I recovering well?</h3></div>

        <div style="padding:16px 18px;border-bottom:1px solid var(--line-soft)">
          <div class="data-sub" style="padding:0 0 8px">HRV · 7 nights</div>${miniSpark(HRV.vals,'#6E7644',[42,55])}
          <div style="font-family:'JetBrains Mono';font-size:11px;color:var(--slate);margin-top:4px">avg <b style="color:var(--ink)">48 ms</b> · balanced</div>
        </div>
        <div style="padding:16px 18px;border-bottom:1px solid var(--line-soft)">
          <div class="data-sub" style="padding:0 0 8px">Resting HR · 7d</div>${miniSpark([47,46,46,45,45,44,44],'#6E7644')}
          <div style="font-family:'JetBrains Mono';font-size:11px;color:var(--slate);margin-top:4px"><b style="color:var(--ink)">44 bpm</b> · ↓ trending down</div>
        </div>
        <div style="padding:16px 18px">
          <div class="data-sub" style="padding:0 0 8px">Sleep · 7 nights</div>${miniSpark([454,471,383,428,462,435,418],'#C4612F')}
          <div style="font-family:'JetBrains Mono';font-size:11px;color:var(--slate);margin-top:4px">avg <b style="color:var(--ink)">7h12</b> · one short night</div>
        </div>
      </div>
      <div class="xq-interp"><span class="ai-dot"></span><div><b>Coach:</b> Recovery is in good shape with one watch-point. HRV is stable inside your baseline band and resting HR is falling — both say you're absorbing the load. The only blemish is Wednesday's 6h23 night, which we've already managed by softening Thursday. Keep protecting sleep on hard-workout days and recovery won't become a limiter.</div></div>
    </div>

    <!-- Q3 load mix -->
    <div class="xq">
      <div class="xq-head"><div class="xqs">Training Load</div><h3>What's my training load mix?</h3></div>
      <div style="padding:18px 24px 6px;border-top:1px solid var(--line-soft)">
        <div class="stack tall">${[['82%','#6E7644'],['10%','#C39A22'],['8%','#C4612F']].map(s=>`<i style="width:${s[0]};background:${s[1]}"></i>`).join('')}</div>

      <div class="bmetrics" style="border-left:0;border-right:0;border-radius:0;margin-top:14px">
        <div class="bm sm"><div class="k">Stress</div><div class="v mono">28<u>/100</u></div><div class="d"><span class="sdot g"></span> Low · avg daily</div></div>

        <div class="bm sm"><div class="k">Respiration</div><div class="v mono">13.6<u>br/min</u></div><div class="d">avg during sleep</div></div>
        <div class="bm sm"><div class="k">Weight</div><div class="v mono">71.2<u>kg</u></div><div class="d"><span class="flat">→ stable</span> race weight</div></div>

function miniStat(k,v,c){
  return `<div style="flex:1;padding:14px 18px;border-right:1px solid var(--line-soft)">
    <div class="k" style="font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.13em;color:var(--slate);text-transform:uppercase">${k}</div>
    <div class="mono" style="font-family:'Inter Tight';font-weight:600;font-size:24px;margin:7px 0 3px;font-variant-numeric:tabular-nums">${v}</div>
    <div style="font-family:'JetBrains Mono';font-size:10px;color:var(--slate)">${esc(c)}</div>
  </div>`;
}

/* ============================================================
   ROUTER
   ============================================================ */
function render(){
  const h=location.hash.replace(/^#/,'') || 'landing';
  const [base,param] = h.split('/');
  state.route=base;
  let html='';
  switch(base){
    case 'landing': html=renderLanding(); break;
    case 'signup': html=renderAuth(); break;
    case 'onboarding': html=renderOnboarding(); break;
    case 'coachonboard': html=renderCoachOnboard(); break;
    case 'dashboard': html=renderDashboard(); break;
    case 'activity': html=renderActivity(param); break;
    case 'coach': html=renderCoach(); break;
    case 'plan': html=renderPlan(); break;
    case 'activities': html=renderActivities(); break;
    case 'explore': html=renderExplore(); break;
    case 'settings': html=renderSettings(); break;
    case 'pricing': html=renderPricing(); break;
    default: html=renderLanding();
  }
  const isApp = !!NAV_TAB[base];
  const side = isApp ? sidebar(base) : '';
  app().innerHTML = side + `<div class="app-main${isApp?' with-side':''}">${html}</div>` + (isApp ? bottomNav(NAV_TAB[base]) : '');
  if(base==='coach'){ scrollChat(); const f=document.getElementById('chat-field'); if(f) f.focus(); }
  if(base==='coachonboard'){
    // auto-start the conversation on first arrival (or a direct reload)
    if(state.coachOnb.messages.length===0 && !state.coachOnb.typing){ startCoachOnboard(); }
    else { obScroll(); const f=document.getElementById('ob-field'); if(f && state.coachOnb.inputEnabled) f.focus(); }
  }
  if(base!=='landing' && base!=='coach' && base!=='coachonboard') window.scrollTo(0,0);
}
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', ()=>{ if(!location.hash) location.hash='landing'; render(); });
render();
</script>
